<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eeff55"/>
      <stop offset="100%" stop-color="#b8d400"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0d0d0d"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#e8ff47" stroke-width="0.5" stroke-opacity="0.18"/>

  <!-- RCL text -->
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
    font-size="14"
    font-weight="900"
    letter-spacing="-0.5"
    fill="url(#lg)"
    filter="url(#g)"
  >RCL</text>

  <!-- Underline accent -->
  <line x1="6" y1="26" x2="26" y2="26" stroke="#e8ff47" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
</svg>
